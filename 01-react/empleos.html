<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevJobs - Empleos</title>
    <meta name="description" content="Encuentra las mejores ofertas de trabajo para desarrolladores en DevJobs.">
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="/utils/mainEmpleos.js"></script>
</head>
</head>
<body>
    <header>
        <h1>
            <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            DevJobs
        </h1>
        <nav>
            <a href="./index.html">Inicio</a>
        </nav>

        <div>
            <devjobs-avatar service="google" username="google.com" size="32">
        </div>
    </header>

    <main>
        <!-- Elemento con clase -->
        <section class="jobs-search">
            <h1>Encuentra tu próximo trabajo</h1>
            <p>Busca empleos de desarrolladores en las mejores empresas del mundo.</p>
            
            <form role="search">
                <div class="search-bar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-search">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                        <path d="M21 21l-6 -6" />
                    </svg>
                    <input id="inputSearch" required type="text" placeholder="Buscar empleos por título, habilidad o empresa">
                    <button id="btnSearch" type="button" disabled>Buscar</button>
                </div>
                <div class="search-filter">
                    <select id="technology" name="technology">
                        <option value="">Tecnología</option>
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="mobile">Mobile</option>
                        <option value="node">Node</option>
                        <option value="react">React</option>
                    </select>
                    <select id="modalidad" name="modalidad">
                        <option value="">Modalidad</option>
                        <option value="remoto">Remoto</option>
                        <option value="presencial">Presencial</option>
                        <option value="hibrido">Híbrido</option>
                    </select>
                    <select id="nivel" name="nivel">
                        <option value="">Nivel</option>
                        <option value="junior">Junior</option>
                        <option value="mid-level">Mid-level</option>
                        <option value="senior">Senior</option>
                    </select>
                    <p id="filter-selected-value" style="margin-top: 1rem; color: var(--primary-light);"></p>
                </div>
            </form>
        </section>
        
        <section> 
            <header>
                <h2>Resultados de la búsqueda</h2>
            </header>

            <div class="jobs-listings">
            </div>

            <nav class="pagination"></nav>
        </section>
    </main>
    <footer>
        <small>&copy; 2026 DevJobs. Todos los derechos reservados.</small>
    </footer>
</body>
</html>
